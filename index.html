        content="Your personal, customizable AI dashboard. Organize ChatGPT, Midjourney, Claude, and your own links in one drag-and-drop interface. No login required. Data stays in your browser.">

    <meta property="og:description" content="The minimalist startpage for power users. Organize your AI workflow.">

    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --border: #27272a;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 导航优化 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(9, 9, 11, 0.9);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
            text-decoration: none;
        }

        .logo span {
            color: var(--primary);
        }

        .actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        button:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        /* 头部文案优化 */
        .toolbar {
            padding: 60px 5% 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
            letter-spacing: -1px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .search-box {
            max-width: 500px;
            margin: 0 auto 30px;
            position: relative;
        }

        input#search {
            width: 100%;
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input#search:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .cat-btn {
            font-size: 14px;
            padding: 6px 14px;
            border-radius: 20px;
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-dim);
        }

        .cat-btn:hover {
            color: var(--text);
            background: var(--card);
        }

        .cat-btn.active {
            background: var(--text);
            color: var(--bg);
            font-weight: bold;
        }

        /* 网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 5%;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 卡片优化 */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            height: 100%;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }

        /* 拖拽效果 */
        .sortable-ghost {
            opacity: 0.4;
            background: #2a2a30;
            border: 1px dashed var(--primary);
        }

        .drag-handle {
            position: absolute;
            top: 12px;
            right: 12px;
            color: #444;
            cursor: grab;
            padding: 4px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .drag-handle {
            opacity: 1;
        }

        .card-top {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 12px;
        }

        .icon {
            width: 44px;
            height: 44px;
            background: #27272a;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .rank-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            margin-left: auto;
            margin-right: 20px;
        }

        .rank-1 {
            background: #eab308;
            color: #000;
        }

        .rank-2 {
            background: #94a3b8;
            color: #000;
        }

        .rank-hot {
            background: #ef4444;
            color: #fff;
        }

        .card-content {
            text-decoration: none;
            color: inherit;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 6px;
            color: #fff;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: auto;
        }

        .tag {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            background: #27272a;
            color: #a1a1aa;
            font-weight: 500;
        }

        .tag.user {
            background: rgba(139, 92, 246, 0.15);
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.2);
        }

        .del-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: transparent;
            border: none;
            color: #ef4444;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: 0.2s;
            padding: 5px;
        }

        .card:hover .del-btn {
            opacity: 1;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal {
            background: #18181b;
            padding: 30px;
            border-radius: 16px;
            width: 90%;
            max-width: 420px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .modal h2 {
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            color: var(--text-dim);
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            background: #09090b;
            border: 1px solid var(--border);
            color: white;
            border-radius: 8px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .modal-actions button {
            flex: 1;
            padding: 12px;
        }

        footer {
            text-align: center;
            color: #52525b;
            margin-top: 50px;
            font-size: 14px;
        }
    </style>
</head>

            { id: "gamma", name: "Gamma", desc: "Generate stunning presentations and webpages using AI.", descZh: "排版极佳的 AI 一键生成 PPT 和演示文稿神器。", cat: "Other", link: "https://gamma.app" },
            { id: "poe", name: "Poe", desc: "Quora's multi-bot aggregator to use dozens of AIs in one place.", descZh: "Quora 出品的聚合平台，能在一个地方切换并使用几十种顶尖 AI 模型。", cat: "Chat", link: "https://poe.com" },
            { id: "suno", name: "Suno", desc: "Generate full songs with lyrics in seconds.", descZh: "音乐生成器，几秒内通过文字生成带人声的歌曲。", cat: "Audio", link: "https://suno.com" },
            { id: "runway", name: "Runway", desc: "Professional AI video editing suite.", descZh: "专业的 AI 视频生成和编辑套件。", cat: "Video", link: "https://runwayml.com" },
            { id: "elevenlabs", name: "ElevenLabs", desc: "Most realistic AI text-to-speech voice generator.", descZh: "最逼真的 AI 文本转语音工具。", cat: "Audio", link: "https://elevenlabs.io" },
            { id: "v0", name: "v0.dev", desc: "Generate flawless react UI and web apps with simple prompts.", descZh: "Vercel 出品的当红炸子鸡，一句话生成可运行的精美 Web 界面。", cat: "Code", link: "https://v0.dev", badge: "hot", badgeClass: "rank-hot" },
            { id: "huggingface", name: "Hugging Face", desc: "The GitHub of AI. Community for models and datasets.", descZh: "全球最大的 AI 开源社区与模型库，AI 领域的 GitHub。", cat: "Other", link: "https://huggingface.co" },
            { id: "notebooklm", name: "NotebookLM", desc: "Google's AI tool to turn your documents into engaging podcasts.", descZh: "Google 出品的爆款研究助手，能把长文档和论文直接转成双人播客对谈。", cat: "Audio", link: "https://notebooklm.google.com", badge: "hot", badgeClass: "rank-hot" },
            { id: "civitai", name: "Civitai", desc: "The world's largest AI art and Stable Diffusion models community.", descZh: "全球最大的开源 AI 绘画（Stable Diffusion）模型库与分享社区（C站）。", cat: "Image", link: "https://civitai.com" }
        ];

        let customTools = JSON.parse(localStorage.getItem('my_custom_tools')) || [];
        let savedOrder = JSON.parse(localStorage.getItem('my_tools_order')) || defaultTools.map(t => t.id);
        let currentCat = 'All';

        function init() {
            applyLanguage();
            render();
            initSortable();
        }

        // --- 多语言逻辑 ---
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            localStorage.setItem('hotai_lang', currentLang);
            applyLanguage();
            render();
        }

        function applyLanguage() {
            const t = translations[currentLang];
            document.getElementById('langToggleBtn').innerHTML = currentLang === 'en' ? '🇨🇳 中 / EN' : '🇺🇸 EN / 中';

            document.getElementById('t_logo').innerHTML = t.logo;
            document.getElementById('t_addLink').innerText = t.addLink;
            document.getElementById('t_title').innerText = t.title;
            document.getElementById('t_subtitle').innerText = t.subtitle;
            document.getElementById('search').placeholder = t.searchPlaceholder;
            document.getElementById('t_footer').innerHTML = t.footer;
            document.getElementById('t_resetLayout').innerText = t.resetLayout;
            if (document.getElementById('t_contact')) document.getElementById('t_contact').innerText = t.contact;
            if (document.getElementById('t_mailLink')) document.getElementById('t_mailLink').innerText = t.mailLink;

            document.getElementById('t_modalTitle').innerText = t.modalTitle;
            document.getElementById('t_modalName').innerText = t.modalName;
            document.getElementById('t_modalLink').innerText = t.modalLink;
            document.getElementById('t_modalCat').innerText = t.modalCat;
            document.getElementById('t_modalCancel').innerText = t.modalCancel;
            document.getElementById('t_modalSubmit').innerText = t.modalSubmit;

            document.getElementById('cat_All').innerText = t.cats['All'];
            document.getElementById('cat_Chat').innerText = t.cats['Chat'];
            document.getElementById('cat_Code').innerText = t.cats['Code'];
            document.getElementById('cat_Image').innerText = t.cats['Image'];
            document.getElementById('cat_Video').innerText = t.cats['Video'];
            document.getElementById('cat_Audio').innerText = t.cats['Audio'];
            document.getElementById('cat_Agent').innerText = t.cats['Agent'];

            const select = document.getElementById('add-cat');
            Array.from(select.options).forEach(opt => {
                opt.text = t.cats[opt.value] || opt.value;
            });

            document.documentElement.lang = currentLang;
        }

        // 获取 favicon (优化了 alt 标签 SEO)
        function getFavicon(url, name) {
            try {
                const domain = new URL(url).hostname;
                const letter = name.charAt(0).toUpperCase();
                // 撤销反代，恢复纯净官方直连（需科学上网加载图像，断网优雅回退）
                return `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=128" alt="${name} Logo" onerror="this.onerror=null; this.outerHTML='<span style=\\'font-size:24px; font-weight:bold; color:#fff;\\'>${letter}</span>'">`;
            } catch (e) {
                return `<span style="font-size:24px; font-weight:bold; color:#fff;">${name.charAt(0).toUpperCase()}</span>`;
            }
        }

        function getSortedTools() {
            let all = [...defaultTools, ...customTools];
            all.sort((a, b) => {
                let idxA = savedOrder.indexOf(a.id.toString());
                let idxB = savedOrder.indexOf(b.id.toString());
                if (idxA === -1) idxA = -1;
                if (idxB === -1) idxB = -1;
                if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                if (idxA === -1 && idxB !== -1) return 1;
                if (idxA !== -1 && idxB === -1) return -1;
                return 0;
            });
            return all;
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const searchVal = document.getElementById('search').value.toLowerCase();
            const tools = getSortedTools();
            const t = translations[currentLang];

            tools.forEach((tool) => {
                const matchCat = currentCat === 'All' || tool.cat === currentCat;
                const desc = currentLang === 'zh' ? (tool.descZh || tool.desc) : tool.desc;
                const matchSearch = tool.name.toLowerCase().includes(searchVal) || desc.toLowerCase().includes(searchVal);

                if (matchCat && matchSearch) {
                    const isCustom = !!tool.isCustom;
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.setAttribute('data-id', tool.id);

                    let badgeText = tool.badge && translations[currentLang].badge[tool.badge] ? translations[currentLang].badge[tool.badge] : tool.badge;
                    let badgeHtml = badgeText ? `<span class="rank-badge ${tool.badgeClass}">${badgeText}</span>` : '';

                    let tagsHtml = `<span class="tag">${t.cats[tool.cat] || tool.cat}</span>`;
                    if (isCustom) tagsHtml += `<span class="tag user">${t.myLink}</span>`;

                    const delBtn = isCustom ? `<button class="del-btn" onclick="deleteTool('${tool.id}')">✕</button>` : '';
                    const iconHtml = getFavicon(tool.link, tool.name);

                    const extraAction = tool.id === 'perplexity' ? `onclick="window.open('/mail.html', '_blank')"` : '';

                    card.innerHTML = `
                        <div class="drag-handle">⋮⋮</div>
                        ${delBtn}
                        <a href="${tool.link}" target="_blank" rel="noopener" class="card-content" ${extraAction}>
                            <div class="card-top">
                                <div class="icon">${iconHtml}</div>
                                ${badgeHtml}
                            </div>
                            <div class="card-title">${tool.name}</div>
                            <div class="card-desc">${desc}</div>
                            <div class="tags">${tagsHtml}</div>
                        </a>
                    `;
                    grid.appendChild(card);
                }
            });
            // 重新初始化拖拽（每次 render 后重建 DOM 需要重绑）
            initSortable();
        }

        function initSortable() {
            const grid = document.getElementById('grid');
            new Sortable(grid, {
                animation: 300,
                easing: 'cubic-bezier(0.25, 1, 0.5, 1)',
                handle: '.drag-handle',
                ghostClass: 'sortable-ghost',
                onEnd: function () {
                    const cards = document.querySelectorAll('.card');
                    const newOrder = Array.from(cards).map(card => card.getAttribute('data-id'));
                    localStorage.setItem('my_tools_order', JSON.stringify(newOrder));
                    savedOrder = newOrder;
                }
            });
        }

        function filterCat(cat) {
            currentCat = cat;
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
            });
            render();
        }

        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }

        function addCustomTool() {
            const name = document.getElementById('add-name').value;
            let link = document.getElementById('add-link').value;
            const cat = document.getElementById('add-cat').value;

            if (!name || !link) return alert(currentLang === 'zh' ? "请输入名称和地址。" : "Please enter a name and URL.");
            if (!link.startsWith('http')) link = 'https://' + link;

            const newTool = {
                id: "custom_" + Date.now(),
                name: name,
                desc: currentLang === 'zh' ? '自定义工具' : "Custom Shortcut",
                descZh: '自定义工具',
                link: link,
                cat: cat,
                isCustom: true
            };

            customTools.unshift(newTool);
            savedOrder.unshift(newTool.id);

            localStorage.setItem('my_custom_tools', JSON.stringify(customTools));
            localStorage.setItem('my_tools_order', JSON.stringify(savedOrder));

            closeModal();
            render();
            document.getElementById('add-name').value = '';
            document.getElementById('add-link').value = '';
        }

        function deleteTool(id) {
            const confirmMsg = currentLang === 'zh' ? "确定删除此工具吗？" : "Remove this shortcut?";
            if (confirm(confirmMsg)) {
                customTools = customTools.filter(t => t.id !== id);
                savedOrder = savedOrder.filter(oid => oid !== id);
                localStorage.setItem('my_custom_tools', JSON.stringify(customTools));
                localStorage.setItem('my_tools_order', JSON.stringify(savedOrder));
                render();
            }
        }

        function resetDefaults() {
            const confirmMsg = currentLang === 'zh' ? "将重置所有布局并删除自定义工具，确定吗？" : "Reset all layout and delete custom tools?";
            if (confirm(confirmMsg)) {
                localStorage.removeItem('my_custom_tools');
                localStorage.removeItem('my_tools_order');
                location.reload();
            }
        }

        init();
    </script>
