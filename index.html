<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HUB | Top AI Tools Directory (Gemini, DeepSeek, ChatGPT)</title>
    <meta name="description" content="Curated list of the best AI tools in 2025. Compare ChatGPT, DeepSeek, Gemini, and more. Customize your own dashboard.">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Google Gemini" },
        { "@type": "ListItem", "position": 2, "name": "DeepSeek" },
        { "@type": "ListItem", "position": 3, "name": "ChatGPT" }
      ]
    }
    </script>

    <style>
        :root {
            --bg: #09090b; --card: #18181b; --border: #27272a;
            --primary: #8b5cf6;
            --text: #f4f4f5; --text-dim: #a1a1aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 50px; }

        /* 导航 */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(9,9,11,0.9); backdrop-filter: blur(10px); z-index: 100;
        }
        .logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--primary); }
        .actions { display: flex; gap: 10px; }
        button {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s;
        }
        button:hover { border-color: var(--primary); color: var(--primary); }
        .btn-primary { background: var(--primary); border-color: var(--primary); color: white; font-weight: bold; }

        /* 头部 */
        .toolbar { padding: 40px 5%; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .search-box { max-width: 600px; margin: 0 auto 30px; }
        input#search {
            width: 100%; padding: 15px 20px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--card); color: white; font-size: 16px; outline: none;
        }
        input#search:focus { border-color: var(--primary); }

        .filters { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .cat-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

        /* 网格 (拖拽区) */
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; padding: 0 5%; max-width: 1600px; margin: 0 auto;
        }

        /* 卡片样式 */
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; display: flex; flex-direction: column; position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        /* 拖拽时的样式 */
        .sortable-ghost { opacity: 0.4; background: #2a2a30; border: 1px dashed var(--primary); }
        .card:hover { border-color: var(--primary); }

        /* 拖拽手柄 */
        .drag-handle {
            position: absolute; top: 10px; right: 10px; color: #444; cursor: grab; padding: 5px; z-index: 10;
            font-size: 18px; line-height: 1; user-select: none;
        }
        .drag-handle:hover { color: var(--text); }
        .card:active .drag-handle { cursor: grabbing; }

        .card-top { display: flex; align-items: center; margin-bottom: 12px; gap: 10px; }
        .icon { width: 40px; height: 40px; background: #27272a; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* 排名徽章 */
        .rank-badge { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; color: #fff; margin-left: auto; margin-right: 25px; /* 让位给拖拽手柄 */ }
        .rank-1 { background: linear-gradient(45deg, #FFD700, #FFA500); color: #000; }
        .rank-2 { background: linear-gradient(45deg, #C0C0C0, #E0E0E0); color: #000; }
        .rank-3 { background: linear-gradient(45deg, #CD7F32, #A0522D); }
        .rank-hot { background: rgba(239, 68, 68, 0.2); color: #fca5a5; }

        /* 内容链接区 */
        .card-content { text-decoration: none; color: inherit; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
        .card-desc { font-size: 0.85rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 10px; }

        .tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: auto; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 4px; background: #333; color: #ccc; }
        .tag.user { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); }

        /* 删除按钮 */
        .del-btn {
            position: absolute; bottom: 15px; right: 15px; background: transparent; border: none;
            color: #ef4444; font-size: 12px; cursor: pointer; opacity: 0; transition: 0.2s;
        }
        .card:hover .del-btn { opacity: 1; }

        /* 弹窗 */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #000; border: 1px solid var(--border); color: white; border-radius: 6px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">AI <span>HUB</span></div>
        <div class="actions">
            <button onclick="toggleLang()">EN / CN</button>
            <button class="btn-primary" onclick="openModal()">+ Add Tool</button>
        </div>
    </nav>

    <div class="toolbar">
        <h1 id="hero-title">Your Personal AI Dashboard</h1>
        <div class="search-box">
            <input type="text" id="search" placeholder="Search..." oninput="render()">
        </div>
        <div class="filters" id="filters">
            </div>
        <div style="font-size:12px; color:#666; margin-top:10px">💡 Tip: Drag cards (⋮⋮) to reorder your dashboard.</div>
    </div>

    <div class="grid" id="grid">
        </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <h2 id="modal-title">Add Custom Website</h2>
            <div class="form-group"><input type="text" id="add-name" placeholder="Tool Name"></div>
            <div class="form-group"><input type="text" id="add-link" placeholder="https://example.com"></div>
            <div class="form-group">
                <select id="add-cat">
                    <option value="Chat">ChatBot</option><option value="Code">Code</option>
                    <option value="Image">Image</option><option value="Video">Video</option>
                    <option value="Audio">Audio</option><option value="Other">Other</option>
                </select>
            </div>
            <div class="form-group"><input type="text" id="add-desc" placeholder="Description..."></div>
            <div class="modal-actions">
                <button onclick="closeModal()">Cancel</button>
                <button class="btn-primary" onclick="addCustomTool()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // === 1. 默认数据 ===
        const defaultTools = [
            { id: "gemini", name: "Google Gemini", desc: "Google's most capable AI. Multimodal.", icon: "💎", cat: "Chat", link: "https://gemini.google.com", badge: "TOP 1", badgeClass: "rank-1", tags: ["Global"] },
            { id: "deepseek", name: "DeepSeek", desc: "China's #1 open-source model. Math genius.", icon: "🦈", cat: "Code", link: "https://chat.deepseek.com", badge: "TOP 2", badgeClass: "rank-2", tags: ["China"] },
            { id: "gpt", name: "ChatGPT", desc: "The OG AI. GPT-4o is powerful.", icon: "🧠", cat: "Chat", link: "https://chat.openai.com", badge: "TOP 3", badgeClass: "rank-3", tags: ["Global"] },
            { id: "candy", name: "Candy.ai (NSFW)", desc: "Uncensored AI Character Chat.", icon: "💋", cat: "Chat", link: "https://candy.ai", badge: "HOT", badgeClass: "rank-hot", tags: ["Global", "Ad"] },
            { id: "claude", name: "Claude 3", desc: "Most human-like writer.", icon: "📜", cat: "Chat", link: "https://claude.ai", tags: ["Global"] },
            { id: "kimi", name: "Kimi", desc: "Long context master (200k+ words).", icon: "🌙", cat: "Chat", link: "https://kimi.moonshot.cn", tags: ["China"] },
            { id: "midjourney", name: "Midjourney", desc: "Best artistic image generator.", icon: "🎨", cat: "Image", link: "https://midjourney.com", tags: ["Global"] },
            { id: "sora", name: "Sora (Info)", desc: "OpenAI's video model.", icon: "🎬", cat: "Video", link: "https://openai.com/sora", tags: ["Global"] },
            { id: "runway", name: "Runway", desc: "AI video editor & generator.", icon: "🎥", cat: "Video", link: "https://runwayml.com", tags: ["Global"] },
            { id: "cursor", name: "Cursor", desc: "AI-first Code Editor.", icon: "🖱️", cat: "Code", link: "https://cursor.sh", tags: ["Global"] },
            { id: "suno", name: "Suno", desc: "Make songs with lyrics.", icon: "🎵", cat: "Audio", link: "https://suno.com", tags: ["Global"] }
        ];

        // === 2. 状态管理 ===
        let customTools = JSON.parse(localStorage.getItem('my_ai_tools')) || [];
        let savedOrder = JSON.parse(localStorage.getItem('ai_tools_order')) || []; // 存储ID顺序
        let currentCat = 'All';
        let isCN = false;

        // 获取并排序所有工具
        function getSortedTools() {
            let all = [...customTools, ...defaultTools];

            // 如果有保存的顺序，按保存的ID排序
            if (savedOrder.length > 0) {
                all.sort((a, b) => {
                    const idxA = savedOrder.indexOf(a.id.toString());
                    const idxB = savedOrder.indexOf(b.id.toString());
                    // 如果ID不在保存列表里（新加的），放到最后
                    return (idxA === -1 ? 999 : idxA) - (idxB === -1 ? 999 : idxB);
                });
            }
            return all;
        }

        function init() {
            renderFilters();
            render();
            initSortable();
        }

        // 初始化拖拽库
        function initSortable() {
            const grid = document.getElementById('grid');
            new Sortable(grid, {
                animation: 150,
                handle: '.drag-handle', // 只能拖这个手柄
                ghostClass: 'sortable-ghost',
                onEnd: function (evt) {
                    // 拖拽结束后，保存新顺序
                    saveOrder();
                }
            });
        }

        // 保存顺序到 LocalStorage
        function saveOrder() {
            const cards = document.querySelectorAll('.card');
            const newOrder = Array.from(cards).map(card => card.getAttribute('data-id'));
            localStorage.setItem('ai_tools_order', JSON.stringify(newOrder));
            savedOrder = newOrder; // 更新内存变量
        }

        function render() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            const searchVal = document.getElementById('search').value.toLowerCase();
            const tools = getSortedTools();

            tools.forEach((t) => {
                const matchCat = currentCat === 'All' || t.cat === currentCat;
                const matchSearch = t.name.toLowerCase().includes(searchVal) || t.desc.toLowerCase().includes(searchVal);

                if(matchCat && matchSearch) {
                    const isCustom = t.isCustom;
                    const card = document.createElement('div'); // 外层是 div，为了包住 handle 和 content
                    card.className = 'card';
                    card.setAttribute('data-id', t.id); // 用于排序识别

                    // 徽章
                    let badgeHtml = t.badge ? `<span class="rank-badge ${t.badgeClass}">${t.badge}</span>` : '';

                    // 标签
                    let tagsHtml = '';
                    if(isCustom) tagsHtml += `<span class="tag user">My Tool</span>`;
                    if(t.tags) t.tags.forEach(tag => tagsHtml += `<span class="tag">${tag}</span>`);

                    // 删除按钮
                    const delBtn = isCustom ? `<button class="del-btn" onclick="deleteTool(${t.id})">Remove</button>` : '';

                    card.innerHTML = `
                        <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
                        ${delBtn}
                        <a href="${t.link}" target="_blank" rel="nofollow noopener" class="card-content">
                            <div class="card-top">
                                <div class="icon">${t.icon}</div>
                                ${badgeHtml}
                            </div>
                            <div class="card-title">${t.name}</div>
                            <div class="card-desc">${t.desc}</div>
                            <div class="tags">${tagsHtml}</div>
                        </a>
                    `;
                    grid.appendChild(card);
                }
            });
        }

        // === 其他逻辑 (语言、添加、删除) ===
        function toggleLang() {
            isCN = !isCN;
            document.getElementById('hero-title').innerText = isCN ? "你的专属 AI 仪表盘" : "Your Personal AI Dashboard";
            document.getElementById('search').placeholder = isCN ? "搜索工具..." : "Search...";
            document.getElementById('modal-title').innerText = isCN ? "添加自定义网址" : "Add Custom Website";
            renderFilters(); render();
        }

        function renderFilters() {
            const cats = isCN
                ? { All: "全部", Chat: "对话", Code: "编程", Image: "绘图", Video: "视频", Audio: "音乐" }
                : { All: "All", Chat: "Chat", Code: "Code", Image: "Image", Video: "Video", Audio: "Audio" };

            const div = document.getElementById('filters');
            div.innerHTML = '';
            Object.keys(cats).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `cat-btn ${currentCat === key ? 'active' : ''}`;
                btn.innerText = cats[key];
                btn.onclick = () => { currentCat = key; renderFilters(); render(); };
                div.appendChild(btn);
            });
        }

        function openModal() { document.getElementById('addModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('addModal').style.display = 'none'; }

        function addCustomTool() {
            const name = document.getElementById('add-name').value;
            const link = document.getElementById('add-link').value;
            const desc = document.getElementById('add-desc').value;
            const cat = document.getElementById('add-cat').value;
            if(!name || !link) return alert("Name and Link required!");

            const newTool = {
                id: Date.now(),
                name: name, desc: desc || "Custom Tool", icon: "📌",
                link: link.startsWith('http') ? link : 'https://' + link,
                cat: cat, isCustom: true
            };
            customTools.unshift(newTool);
            localStorage.setItem('my_ai_tools', JSON.stringify(customTools));
            closeModal(); render();
            document.getElementById('add-name').value = '';
            document.getElementById('add-link').value = '';
        }

        function deleteTool(id) {
            if(confirm("Delete this bookmark?")) {
                customTools = customTools.filter(t => t.id !== id);
                localStorage.setItem('my_ai_tools', JSON.stringify(customTools));
                render();
            }
        }

        init();
    </script>
</body>
</html>
